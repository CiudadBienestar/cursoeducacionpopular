<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Educación Popular</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <style>
      /* Limita el tamaño del carrusel */
      .carousel-item img {
        height: 320px;       /* Ajuste principal */
        object-fit: cover;   /* Recorta sin deformar */
      }

      /* Versión móvil */
      @media (max-width: 768px) {
        .carousel-item img {
          height: 180px;
        }
      }

      /* Opcional: centrar y limitar ancho */
      .carousel-container {
        max-width: 900px;
        margin: auto;
      }
    </style>
  </head>

  <body>

    <div class="carousel-container">
      <div
        id="carouselExampleIndicators"
        class="carousel slide"
        data-bs-ride="carousel"
      >

        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3"></button>
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4"></button>
        </div>

        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="Diapositiva1.PNG" class="d-block w-100" alt="Primera">
          </div>
          <div class="carousel-item">
            <img src="Diapositiva2.PNG" class="d-block w-100" alt="Segunda">
          </div>
          <div class="carousel-item">
            <img src="Diapositiva3.PNG" class="d-block w-100" alt="Tercera">
          </div>
          <div class="carousel-item">
            <img src="Diapositiva4.PNG" class="d-block w-100" alt="Cuarta">
          </div>
          <div class="carousel-item">
            <img src="Diapositiva5.PNG" class="d-block w-100" alt="Quinta">
          </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
